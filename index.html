<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>森林冒险家园 - 家务轮盘游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green-50: #EAF3DE;
  --green-100: #C0DD97;
  --green-200: #97C459;
  --green-400: #639922;
  --green-600: #3B6D11;
  --green-800: #27500A;
  --green-900: #173404;
  --blue-50: #E6F1FB;
  --blue-100: #B5D4F4;
  --blue-200: #85B7EB;
  --blue-400: #378ADD;
  --blue-600: #185FA5;
  --blue-800: #0C447C;
  --amber-50: #FAEEDA;
  --amber-100: #FAC775;
  --amber-200: #EF9F27;
  --amber-400: #BA7517;
  --amber-600: #854F0B;
  --amber-800: #633806;
  --gray-50: #F1EFE8;
  --gray-100: #D3D1C7;
  --gray-200: #B4B2A9;
  --gray-400: #888780;
  --gray-600: #5F5E5A;
  --gray-800: #444441;
  --gray-900: #2C2C2A;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Mobile container */
.phone-frame {
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--gray-50);
  position: relative;
  padding-bottom: 80px;
}

/* ===== Pages ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== Tab Bar ===== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 390px;
  background: #fff;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 12px 0 20px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  z-index: 100;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.2s;
  padding: 4px 12px;
  border-radius: 12px;
}

.tab-item.active {
  color: var(--green-600);
}

.tab-item .tab-icon { font-size: 24px; }
.tab-item .tab-label { font-size: 11px; font-weight: 500; }

/* ===== Header ===== */
.player-header {
  background: linear-gradient(135deg, var(--green-400), var(--green-600));
  color: #fff;
  padding: 24px 20px 20px;
  border-radius: 0 0 24px 24px;
}

.level-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.level-badge {
  background: rgba(255,255,255,0.2);
  padding: 6px 16px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 500;
}

.level-num {
  font-size: 28px;
  font-weight: bold;
}

.stats-row {
  display: flex;
  gap: 20px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.15);
  padding: 8px 14px;
  border-radius: 12px;
  flex: 1;
}

.stat-icon { font-size: 18px; }
.stat-value { font-size: 16px; font-weight: bold; }
.stat-label { font-size: 11px; opacity: 0.8; }

/* ===== AI Tip Banner ===== */
.ai-tip-banner {
  margin: 16px;
  background: linear-gradient(135deg, var(--amber-50), var(--amber-100));
  border-radius: 16px;
  padding: 16px;
  border: 1px solid var(--amber-200);
  cursor: pointer;
  transition: transform 0.2s;
}

.ai-tip-banner:hover { transform: scale(1.02); }

.ai-tip-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.ai-avatar {
  font-size: 28px;
}

.ai-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--amber-600);
}

.ai-message {
  font-size: 13px;
  color: var(--amber-800);
  line-height: 1.6;
}

.ai-knowledge {
  font-size: 12px;
  color: var(--amber-600);
  margin-top: 8px;
  padding: 8px;
  background: rgba(255,255,255,0.5);
  border-radius: 8px;
  font-style: italic;
}

/* ===== Age Selector ===== */
.age-selector {
  display: flex;
  gap: 12px;
  padding: 0 16px;
  margin: 16px 0;
}

.age-option {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 8px;
  background: #fff;
  border-radius: 16px;
  border: 2px solid var(--green-50);
  cursor: pointer;
  transition: all 0.3s;
}

.age-option.active {
  background: var(--green-400);
  border-color: var(--green-600);
}

.age-option.active .age-text { color: #fff; }
.age-option .age-emoji { font-size: 32px; margin-bottom: 4px; }
.age-option .age-text { font-size: 12px; color: var(--gray-600); font-weight: 500; }

/* ===== Wheel ===== */
.wheel-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
}

.wheel-container {
  position: relative;
  width: 300px;
  height: 300px;
  margin-bottom: 24px;
}

.wheel-canvas {
  width: 300px;
  height: 300px;
  transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

.wheel-pointer {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  z-index: 10;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

.draw-btn {
  background: linear-gradient(135deg, var(--green-400), var(--green-600));
  color: #fff;
  border: none;
  padding: 16px 64px;
  border-radius: 32px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(99, 153, 34, 0.4);
  transition: all 0.3s;
}

.draw-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 153, 34, 0.5); }
.draw-btn:active { transform: translateY(0); }
.draw-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ===== Result Card ===== */
.result-section {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
}

.result-section.show { display: flex; }

.card-reveal {
  animation: cardReveal 0.6s ease-out;
}

@keyframes cardReveal {
  from { transform: scale(0.3) rotateY(90deg); opacity: 0; }
  to { transform: scale(1) rotateY(0deg); opacity: 1; }
}

.game-card {
  width: 320px;
  border-radius: 24px;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.game-card.N { background: var(--green-50); border: 3px solid var(--green-400); }
.game-card.R { background: var(--blue-50); border: 3px solid var(--blue-400); }
.game-card.SR { background: var(--amber-50); border: 3px solid var(--amber-400); }

.rarity-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  padding: 4px 14px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  color: #fff;
}

.game-card.N .rarity-badge { background: var(--green-400); }
.game-card.R .rarity-badge { background: var(--blue-400); }
.game-card.SR .rarity-badge { background: var(--amber-400); }

.card-emoji {
  font-size: 72px;
  margin: 16px 0;
  animation: emojiPulse 2s infinite;
}

@keyframes emojiPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.card-name {
  font-size: 24px;
  font-weight: bold;
  color: var(--gray-900);
  margin-bottom: 8px;
}

.card-task {
  font-size: 16px;
  color: var(--gray-600);
  margin-bottom: 8px;
}

.card-desc {
  font-size: 14px;
  color: var(--gray-400);
  font-style: italic;
  margin-bottom: 16px;
}

.card-reward {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding-top: 12px;
}

.reward-xp { color: var(--green-600); font-weight: bold; font-size: 15px; }
.reward-gold { color: var(--amber-600); font-weight: bold; font-size: 15px; }

.action-btns {
  display: flex;
  gap: 16px;
  margin-top: 20px;
}

.btn {
  padding: 14px 36px;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.btn-confirm { background: var(--green-400); color: #fff; box-shadow: 0 4px 12px rgba(99, 153, 34, 0.3); }
.btn-confirm:hover { background: var(--green-600); }
.btn-redraw { background: #fff; color: var(--green-400); border: 2px solid var(--green-400); }

/* ===== Task Page ===== */
.page-title {
  font-size: 20px;
  font-weight: 500;
  padding: 20px 20px 8px;
  color: var(--gray-900);
}

.page-subtitle {
  font-size: 13px;
  color: var(--gray-400);
  padding: 0 20px;
}

.task-card {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin: 12px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.3s;
}

.task-card.completed { opacity: 0.5; }

.task-emoji {
  font-size: 36px;
  margin-right: 14px;
}

.task-content { flex: 1; min-width: 0; }

.task-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.task-name { font-size: 15px; font-weight: 500; color: var(--gray-900); }

.rarity-tag {
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: bold;
  color: #fff;
}

.rarity-tag.N { background: var(--green-400); }
.rarity-tag.R { background: var(--blue-400); }
.rarity-tag.SR { background: var(--amber-400); }

.task-task { font-size: 13px; color: var(--gray-600); }
.task-desc { font-size: 12px; color: var(--gray-400); font-style: italic; }

.task-reward { display: flex; gap: 12px; margin-top: 4px; }
.task-reward span { font-size: 12px; font-weight: 500; }

.check-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.check-btn.checked {
  background: var(--green-400);
  border-color: var(--green-400);
}

.check-icon {
  color: #fff;
  font-weight: bold;
  font-size: 18px;
}

/* Progress */
.progress-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.progress-title { font-size: 16px; font-weight: 500; }
.progress-count { font-size: 16px; font-weight: bold; color: var(--green-400); }

.progress-bar {
  height: 12px;
  background: var(--green-50);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-200), var(--green-400));
  border-radius: 6px;
  transition: width 0.5s ease;
}

.progress-total {
  display: flex;
  justify-content: space-around;
}

.progress-total span { font-size: 13px; font-weight: 500; }

/* ===== Collection Page ===== */
.collection-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 16px;
}

.collection-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px 8px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}

.collection-card:hover { transform: translateY(-2px); }
.collection-card.collected { border-color: var(--green-400); }
.collection-card.hidden { background: var(--gray-100); }

.collection-card .card-emoji { font-size: 32px; }
.collection-card .card-name { font-size: 11px; color: var(--gray-900); margin-top: 4px; }
.collection-card.hidden .card-emoji { filter: blur(4px); }
.collection-card.hidden .card-name { color: var(--gray-400); }

.collection-card .rarity-badge {
  position: static;
  display: inline-block;
  margin-top: 4px;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  color: #fff;
}

.collection-card.N .rarity-badge { background: var(--green-400); }
.collection-card.R .rarity-badge { background: var(--blue-400); }
.collection-card.SR .rarity-badge { background: var(--amber-400); }

/* ===== Shop Page ===== */
.shop-item {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin: 12px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.shop-icon { font-size: 36px; margin-right: 14px; }
.shop-info { flex: 1; }
.shop-name { font-size: 15px; font-weight: 500; color: var(--gray-900); }
.shop-desc { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

.shop-price {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--amber-50);
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: bold;
  color: var(--amber-600);
  cursor: pointer;
  border: none;
}

.shop-price:hover { background: var(--amber-100); }

/* ===== Achievement Page ===== */
.achievement-card {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin: 12px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.achievement-card.locked { opacity: 0.4; }

.achievement-icon { font-size: 36px; margin-right: 14px; }
.achievement-info { flex: 1; }
.achievement-name { font-size: 15px; font-weight: 500; color: var(--gray-900); }
.achievement-desc { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.achievement-reward { font-size: 12px; color: var(--green-600); font-weight: bold; margin-top: 4px; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal-overlay.show { display: flex; }

.modal {
  width: 340px;
  background: #fff;
  border-radius: 24px;
  padding: 32px 24px;
  text-align: center;
  animation: modalIn 0.3s ease-out;
}

@keyframes modalIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-title { font-size: 22px; font-weight: bold; color: var(--gray-900); margin-bottom: 20px; }
.modal-btn {
  margin-top: 20px;
  padding: 14px 48px;
  background: var(--green-400);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 16px;
  z-index: 300;
  display: none;
  animation: toastIn 0.3s ease-out;
}

.toast.show { display: block; }

@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 40px;
  text-align: center;
}

.empty-state .emoji { font-size: 64px; margin-bottom: 16px; }
.empty-state .text { font-size: 16px; color: var(--gray-600); }
.empty-state .hint { font-size: 13px; color: var(--gray-400); margin-top: 8px; }

/* ===== Filter Bar ===== */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
}

.filter-item {
  padding: 8px 16px;
  background: #fff;
  border-radius: 12px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  border: 2px solid transparent;
  transition: all 0.2s;
}

.filter-item.active {
  background: var(--green-400);
  color: #fff;
}

/* Scrollbar hide */
.filter-bar::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- ===== Page: 转盘抽奖 ===== -->
  <div class="page active" id="page-index">
    <div class="player-header">
      <div class="level-row">
        <div>
          <span class="level-badge" id="levelTitle">见习冒险者</span>
          <span class="level-num" id="levelNum">Lv.1</span>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-icon">⭐</span>
            <span class="stat-value" id="totalXp">0</span>
            <span class="stat-label">经验</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">🪙</span>
            <span class="stat-value" id="goldNum">0</span>
            <span class="stat-label">金币</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon">🔥</span>
            <span class="stat-value" id="consecDays">0</span>
            <span class="stat-label">连续</span>
          </div>
        </div>
      </div>
    </div>

    <!-- AI 每日知识 -->
    <div class="ai-tip-banner" id="aiBanner">
      <div class="ai-tip-header">
        <span class="ai-avatar">🌳</span>
        <span class="ai-name">森林长者</span>
      </div>
      <div class="ai-message" id="aiMessage"></div>
      <div class="ai-knowledge" id="aiKnowledge"></div>
    </div>

    <!-- 年龄选择 -->
    <div class="age-selector">
      <div class="age-option active" data-age="little" onclick="selectAge('little')">
        <span class="age-emoji">🌱</span>
        <span class="age-text">3-6岁</span>
      </div>
      <div class="age-option" data-age="standard" onclick="selectAge('standard')">
        <span class="age-emoji">🌳</span>
        <span class="age-text">7-12岁</span>
      </div>
      <div class="age-option" data-age="leader" onclick="selectAge('leader')">
        <span class="age-emoji">👑</span>
        <span class="age-text">9-12岁进阶</span>
      </div>
    </div>

    <!-- 轮盘 -->
    <div class="wheel-section" id="wheelSection">
      <div class="wheel-container">
        <div class="wheel-pointer">🌟</div>
        <canvas class="wheel-canvas" id="wheelCanvas" width="600" height="600"></canvas>
      </div>
      <button class="draw-btn" id="drawBtn" onclick="spinWheel()">🎯 开始抽取</button>
    </div>

    <!-- 结果 -->
    <div class="result-section" id="resultSection">
      <div class="card-reveal">
        <div class="game-card" id="resultCard">
          <span class="rarity-badge" id="resultRarity"></span>
          <div class="card-emoji" id="resultEmoji"></div>
          <div class="card-name" id="resultName"></div>
          <div class="card-task" id="resultTask"></div>
          <div class="card-desc" id="resultDesc"></div>
          <div class="card-reward">
            <span class="reward-xp" id="resultXp"></span>
            <span class="reward-gold" id="resultGold"></span>
          </div>
        </div>
        <div class="action-btns">
          <button class="btn btn-confirm" onclick="confirmTask()">✅ 确认任务</button>
          <button class="btn btn-redraw" onclick="redraw()">🔄 再抽一次</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Page: 今日任务 ===== -->
  <div class="page" id="page-task">
    <div class="page-title">📋 今日任务</div>
    <div class="page-subtitle" id="taskCount">0 个任务待完成</div>

    <div id="taskList">
      <div class="empty-state" id="emptyTasks">
        <div class="emoji">🌟</div>
        <div class="text">还没有今日任务哦～</div>
        <div class="hint">先去转盘抽取角色卡吧！</div>
      </div>
    </div>

    <div class="progress-card" id="progressCard" style="display:none;">
      <div class="progress-header">
        <span class="progress-title">完成进度</span>
        <span class="progress-count" id="progressCount">0/0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-total">
        <span id="progressXP">累计经验: +0 XP</span>
        <span id="progressGold">累计金币: +0 金币</span>
      </div>

// ===== Wheel Draw =====
function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const chars = charSets[selectedAge];
  const size = 600;
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 20;
  const n = chars.length;
  const angle = (2 * Math.PI) / n;
  
  const colors = ['#EAF3DE','#C0DD97','#E6F1FB','#B5D4F4','#FAEEDA','#FAC775'];
  
  ctx.clearRect(0, 0, size, size);
  
  for (let i = 0; i < n; i++) {
    const start = i * angle;
    const end = start + angle;
    
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 3;
    ctx.stroke();
    
    const mid = start + angle / 2;
    const ex = cx + Math.cos(mid) * (r * 0.6);
    const ey = cy + Math.sin(mid) * (r * 0.6);
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(chars[i].emoji, ex, ey);
  }
  
  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 36, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#639922';
  ctx.lineWidth = 4;
  ctx.stroke();
}

// ===== Spin Wheel =====
function spinWheel() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('drawBtn').textContent = '🎰 抽取中...';
  
  const chars = charSets[selectedAge];
  
  // Rarity roll
  const roll = Math.random() * 100;
  let rarity;
  if (selectedAge === 'little') {
    rarity = roll < 90 ? 'N' : 'R';
  } else if (selectedAge === 'leader') {
    rarity = roll < 30 ? 'N' : roll < 70 ? 'R' : 'SR';
  } else {
    rarity = roll < 60 ? 'N' : roll < 90 ? 'R' : 'SR';
  }
  
  const candidates = chars.filter(c => c.rarity === rarity);
  currentCard = candidates[Math.floor(Math.random() * candidates.length)];
  
  // Rotate
  const canvas = document.getElementById('wheelCanvas');
  const rotations = 3 + Math.random() * 2;
  const randomAngle = Math.random() * 360;
  const totalRotation = rotations * 360 + randomAngle;
  canvas.style.transform = `rotate(${totalRotation}deg)`;
  
  setTimeout(() => {
    isSpinning = false;
    document.getElementById('drawBtn').disabled = false;
    document.getElementById('drawBtn').textContent = '🎯 开始抽取';
    showResult();
  }, 3200);
}

// ===== Show Result =====
function showResult() {
  document.getElementById('wheelSection').style.display = 'none';
  const section = document.getElementById('resultSection');
  section.classList.add('show');
  
  const card = document.getElementById('resultCard');
  card.className = 'game-card ' + currentCard.rarity;
  
  document.getElementById('resultRarity').textContent = currentCard.rarity;
  document.getElementById('resultEmoji').textContent = currentCard.emoji;
  document.getElementById('resultName').textContent = currentCard.name;
  document.getElementById('resultTask').textContent = currentCard.task;
  document.getElementById('resultDesc').textContent = currentCard.desc;
  document.getElementById('resultXp').textContent = '⭐ +' + currentCard.xp + ' 经验';
  document.getElementById('resultGold').textContent = '🪙 +' + currentCard.gold + ' 金币';
  
  // Add to today tasks
  if (!player.todayTasks.find(t => t.id === currentCard.id)) {
    player.todayTasks.push({ ...currentCard, completed: false });
  }
  savePlayer();
}

// ===== Confirm Task =====
function confirmTask() {
  if (!currentCard) return;
  
  // Add XP and Gold
  player.totalXp += currentCard.xp;
  player.gold += currentCard.gold;
  player.completedCount++;
  
  // Check level up
  for (let i = levelConfig.length - 1; i >= 0; i--) {
    if (player.totalXp >= levelConfig[i].cxp && player.level < levelConfig[i].level) {
      player.level = levelConfig[i].level;
      showToast('🎉 升级！现在是 ' + levelConfig[i].title);
      break;
    }
  }
  
  // Track collected
  if (!player.collected.includes(currentCard.id)) {
    player.collected.push(currentCard.id);
  }
  
  // Complete task
  const task = player.todayTasks.find(t => t.id === currentCard.id);
  if (task) task.completed = true;
  
  savePlayer();
  updateUI();
  
  showToast('✅ 任务确认！+' + currentCard.xp + ' XP +' + currentCard.gold + ' 金币');
  
  setTimeout(() => {
    document.getElementById('resultSection').classList.remove('show');
    document.getElementById('wheelSection').style.display = 'flex';
  }, 1000);
}

// ===== Redraw =====
function redraw() {
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('wheelSection').style.display = 'flex';
  const canvas = document.getElementById('wheelCanvas');
  canvas.style.transition = 'none';
  canvas.style.transform = 'rotate(0deg)';
  setTimeout(() => { canvas.style.transition = 'transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99)'; }, 50);
}

// ===== Render Tasks =====
function renderTasks() {
  const list = document.getElementById('taskList');
  const empty = document.getElementById('emptyTasks');
  const progressCard = document.getElementById('progressCard');
  
  if (player.todayTasks.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = 'flex';
    progressCard.style.display = 'none';
    document.getElementById('taskCount').textContent = '0 个任务待完成';
    return;
  }
  
  empty.style.display = 'none';
  list.innerHTML = '';
  
  let completedCount = 0;
  let totalXP = 0;
  let totalGold = 0;
  
  player.todayTasks.forEach((task, idx) => {
    if (task.completed) {
      completedCount++;
      totalXP += task.xp;
      totalGold += task.gold;
    }
    
    const card = document.createElement('div');
    card.className = 'task-card' + (task.completed ? ' completed' : '');
    card.innerHTML = `
      <div class="task-emoji">${task.emoji}</div>
      <div class="task-content">
        <div class="task-header">
          <span class="task-name">${task.name}</span>
          <span class="rarity-tag ${task.rarity}">${task.rarity}</span>
        </div>
        <div class="task-task">${task.task}</div>
        <div class="task-desc">${task.desc}</div>
        <div class="task-reward">
          <span style="color:var(--green-600)">⭐ ${task.xp} XP</span>
          <span style="color:var(--amber-600)">🪙 ${task.gold} 金币</span>
        </div>
      </div>
      <div class="check-btn ${task.completed ? 'checked' : ''}" onclick="toggleTask(${idx})">
        <span class="check-icon">${task.completed ? '✓' : ''}</span>
      </div>
    `;
    list.appendChild(card);
  });
  
  document.getElementById('taskCount').textContent = (player.todayTasks.length - completedCount) + ' 个任务待完成';
  
  progressCard.style.display = 'block';
  const progress = player.todayTasks.length > 0 ? Math.round((completedCount / player.todayTasks.length) * 100) : 0;
  document.getElementById('progressCount').textContent = completedCount + '/' + player.todayTasks.length;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressXP').textContent = '累计经验: +' + totalXP + ' XP';
  document.getElementById('progressGold').textContent = '累计金币: +' + totalGold + ' 金币';
}

function toggleTask(idx) {
  const task = player.todayTasks[idx];
  task.completed = !task.completed;
  savePlayer();
  renderTasks();
  
  if (task.completed) {
    player.totalXp += task.xp;
    player.gold += task.gold;
    savePlayer();
    updateUI();
  }
}

// ===== Render Collection =====
let currentFilter = 'all';

function renderCollection(filter) {
  if (filter !== undefined) currentFilter = filter;
  
  const grid = document.getElementById('collectionGrid');
  grid.innerHTML = '';
  
  let allChars = [];
  if (currentFilter === 'all') {
    allChars = [...charSets.little, ...charSets.standard, ...charSets.leader];
  } else {
    allChars = charSets[currentFilter];
  }
  
  document.getElementById('collectionCount').textContent = '已收集 ' + player.collected.length + '/' + allChars.length;
  
  allChars.forEach(char => {
    const collected = player.collected.includes(char.id);
    const card = document.createElement('div');
    card.className = 'collection-card ' + char.rarity + (collected ? ' collected' : ' hidden');
    card.innerHTML = `
      <div class="card-emoji">${collected ? char.emoji : '❓'}</div>
      <div class="card-name">${collected ? char.name : '未收集'}</div>
      <span class="rarity-badge">${char.rarity}</span>
    `;
    grid.appendChild(card);
  });
}

function filterCollection(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('#page-collection .filter-item').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  renderCollection();
}

// ===== Render Shop =====
function renderShop() {
  document.getElementById('shopGold').textContent = '金币: ' + player.gold;
  const list = document.getElementById('shopList');
  list.innerHTML = '';
  
  shopItems.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'shop-item';
    el.innerHTML = `
      <div class="shop-icon">${item.icon}</div>
      <div class="shop-info">
        <div class="shop-name">${item.name}</div>
        <div class="shop-desc">${item.desc}</div>
      </div>
      <button class="shop-price" onclick="buyItem(${idx})">🪙 ${item.price}</button>
    `;
    list.appendChild(el);
  });
}

function buyItem(idx) {
  const item = shopItems[idx];
  if (player.gold < item.price) {
    showToast('❌ 金币不足！需要 ' + item.price + ' 金币');
    return;
  }
  player.gold -= item.price;
  savePlayer();
  renderShop();
  updateUI();
  showToast('🎉 兑换成功：' + item.name);
}

// ===== Render Achievements =====
function renderAchievements() {
  const list = document.getElementById('achievementList');
  list.innerHTML = '';
  
  let unlocked = 0;
  
  achievements.forEach(ach => {
    // Simple unlock logic for demo
    const isUnlocked = player.completedCount >= 1;
    if (isUnlocked) unlocked++;
    
    const el = document.createElement('div');
    el.className = 'achievement-card' + (isUnlocked ? '' : ' locked');
    el.innerHTML = `
      <div class="achievement-icon">${ach.icon}</div>
      <div class="achievement-info">
        <div class="achievement-name">${ach.name}</div>
        <div class="achievement-desc">${ach.desc}</div>
        <div class="achievement-reward">🪙 ${ach.reward} 金币</div>
      </div>
    `;
    list.appendChild(el);
  });
  
  document.getElementById('achCount').textContent = '已解锁 ' + unlocked + '/' + achievements.length;
}

// ===== Update UI =====
function updateUI() {
  const levelInfo = levelConfig.find(l => l.level === player.level) || levelConfig[0];
  document.getElementById('levelTitle').textContent = levelInfo.title;
  document.getElementById('levelNum').textContent = 'Lv.' + player.level;
  document.getElementById('totalXp').textContent = player.totalXp;
  document.getElementById('goldNum').textContent = player.gold;
  document.getElementById('consecDays').textContent = player.consecutiveDays;
}

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== Start =====
init();
</script>
</body>
</html>
